<!DOCTYPE html>
<html>
<head>
    <title>SafeLix - AI Startup Analyzer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #020617;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.4);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #38bdf8;
        }

        .menu a {
            color: #cbd5f5;
            margin-left: 20px;
            text-decoration: none;
            font-size: 14px;
        }

        .menu a:hover {
            color: #38bdf8;
        }

        /* MAIN CONTAINER */
        .main {
            height: calc(100vh - 70px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #0b1220;
            padding: 40px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 0;
            font-size: 32px;
            color: #38bdf8;
        }

        .tagline {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        label {
            font-size: 14px;
            color: #cbd5f5;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 18px 0;
            border-radius: 8px;
            border: none;
            background: #1e293b;
            color: white;
        }

        input:focus {
            outline: 2px solid #38bdf8;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0ea5e9;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }
.loader {
    display: none;
    text-align: center;
    margin-top: 15px;
    color: #38bdf8;
    font-size: 14px;
}

.spinner {
    border: 4px solid #1e293b;
    border-top: 4px solid #38bdf8;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">SafeLix</div>
    <div class="menu">
        <a href="/">Home</a>
        <a href="/view">View Analyses</a>
        <a href="#">About SafeLix</a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <div class="container">

        <h1>SafeLix</h1>
        <div class="tagline">AI Startup Analyzer — Validate your idea before you build it</div>

        <form action="/analyze" method="post">

            <label>Startup Idea</label>
            <input type="text" name="idea" placeholder="Describe your startup idea">

            <label>Estimated Budget</label>
            <input type="text" name="budget" placeholder="Enter budget amount">

            <label>Team Skills</label>
            <input type="text" name="team" placeholder="Developer, marketing, design...">

            <button type="submit">Start Analysis</button>
<div class="loader" id="loader">
    <div class="spinner"></div>
    Analyzing your startup idea...
</div>


        </form>

        <div class="footer">
            Powered by SafeLix AI Engine
        </div>

    </div>
</div>
<script>
    const form = document.querySelector("form");
    const loader = document.getElementById("loader");

    form.addEventListener("submit", function() {
        loader.style.display = "block";
    });
</script>


</body>
</html>
