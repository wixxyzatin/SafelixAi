<!DOCTYPE html>
<html>
<head>
    <title>SafeLix Admin Panel</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
        }

        .container {
            padding: 40px;
        }

        h1 {
            color: #38bdf8;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: #0b1220;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #1e293b;
        }

        th {
            color: #38bdf8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Admin Panel</h1>

    <h3>Users</h3>
    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
        </tr>

        {% for u in users %}
        <tr>
            <td>{{u[0]}}</td>
            <td>{{u[1]}}</td>
            <td>{{u[2]}}</td>
        </tr>
        {% endfor %}
    </table>

    <h3>Startup Analyses</h3>
    <table>
        <tr>
            <th>Idea</th>
            <th>Budget</th>
            <th>Team</th>
            <th>Score</th>
        </tr>

        {% for row in ideas %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
