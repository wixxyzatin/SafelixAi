<!DOCTYPE html>
<html>
<head>
    <title>SafeLix - Saved Analyses</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
        }

        .navbar {
            background: #020617;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.4);
        }

        .logo {
            font-size: 22px;
            color: #38bdf8;
            font-weight: bold;
        }

        .menu a {
            margin-left: 20px;
            text-decoration: none;
            color: #cbd5f5;
            font-size: 14px;
        }

        .menu a:hover {
            color: #38bdf8;
        }

        .container {
            padding: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #0b1220;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #1e293b;
        }

        th {
            color: #38bdf8;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">SafeLix</div>

    <div class="menu">
        <a href="/dashboard">Dashboard</a>
        <a href="/analyzer">Analyze</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <h2>Saved Startup Analyses</h2>

    <table>
        <tr>
            <th>Idea</th>
            <th>Budget</th>
            <th>Team</th>
            <th>Score</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}%</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
