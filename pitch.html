<!DOCTYPE html>
<html>
<head>
<title>SafeLix Pitch Builder</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#020617;
color:white;
}

.container{
max-width:900px;
margin:40px auto;
padding:30px;
}

h1{
color:#38bdf8;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
padding:14px;
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
border:none;
border-radius:8px;
color:black;
font-weight:bold;
width:100%;
cursor:pointer;
}

.result{
margin-top:30px;
background:#0b1220;
padding:25px;
border-radius:12px;
line-height:1.6;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>Startup Pitch Builder</h1>

<form method="POST">

<input name="startup" placeholder="Startup name" required>
<input name="industry" placeholder="Industry" required>
<input name="problem" placeholder="Problem you solve" required>
<input name="solution" placeholder="Your solution" required>

<button type="submit">Generate Pitch</button>

</form>

{% if pitch %}
<div class="result">
{{ pitch }}
</div>
{% endif %}

</div>

</body>
</html>
