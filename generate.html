<!DOCTYPE html>
<html>
<head>
<title>SafeLix AI Generator</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#020617;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
color:#38bdf8;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
padding:14px;
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
border:none;
border-radius:8px;
color:black;
font-weight:bold;
width:100%;
cursor:pointer;
}

.result{
margin-top:30px;
background:#0b1220;
padding:25px;
border-radius:12px;
}

.result h3{
color:#38bdf8;
}
</style>
</head>

<body>

<div class="container">

<h1>SafeLix AI Startup Generator</h1>

<form method="POST">

<input name="industry" placeholder="Industry (Fintech, Food, AI)" required>
<input name="skills" placeholder="Your Skills" required>
<input name="budget" placeholder="Budget" required>
<input name="interest" placeholder="Interest Area" required>

<button type="submit">Generate Startup Plan</button>

</form>

{% if idea %}

<div class="result">

<h3>{{idea}}</h3>

<p><b>Problem:</b> {{problem}}</p>
<p><b>Solution:</b> {{solution}}</p>
<p><b>Target Market:</b> {{market}}</p>
<p><b>Revenue Model:</b> {{revenue}}</p>
<p><b>MVP Idea:</b> {{mvp}}</p>
<p><b>Startup Pitch:</b> {{pitch}}</p>

</div>

{% endif %}

</div>

</body>
</html>
