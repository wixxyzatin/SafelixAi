<!DOCTYPE html>
<html>
<head>
<title>Login - SafeLix</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#020617;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:#0b1220;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>SafeLix Login</h2>

<form method="POST" action="/">

<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have account?</p>
<a href="/signup" style="color:#38bdf8;">Signup</a>

</div>

</body>
</html>
